name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: OrchardGridCore (shared primitives)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run OrchardGridCore tests
        working-directory: Packages/OrchardGridCore
        run: swift test

  cli:
    name: og CLI (Swift unit + pytest e2e)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install pytest
        run: python3 -m pip install --break-system-packages --user pytest

      - name: Run CLI tests
        working-directory: orchardgrid-cli
        run: make test

  # The Xcode app test target can't run on CI: the app entitlements
  # (App Group, hardened runtime, Clerk) require a development signing
  # certificate that the runner doesn't have. Contributors run
  # `make test-xcode` locally before opening a PR. Shared pure-logic
  # primitives live in Packages/OrchardGridCore and DO run on CI via
  # the `core` job above.

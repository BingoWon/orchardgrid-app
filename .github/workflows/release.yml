name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      skipped: ${{ steps.bump.outputs.skipped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and release
        id: bump
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)

          if [ -z "$LATEST" ]; then
            VERSION="1.0.0"
            echo "Initial release v${VERSION}"
            NOTES="Initial release."
          else
            COMMITS=$(git log "${LATEST}..HEAD" --pretty=format:'%s')

            FEAT=0; FIX=0
            while IFS= read -r msg; do
              [[ -z "$msg" ]] && continue
              lower=$(echo "$msg" | tr '[:upper:]' '[:lower:]')
              if [[ "$lower" =~ ^feat ]]; then FEAT=1
              elif [[ "$lower" =~ ^(fix|perf|refactor) ]]; then FIX=1
              fi
            done <<< "$COMMITS"

            if (( !FEAT && !FIX )); then
              echo "No releasable commits since ${LATEST} — skipping."
              echo "skipped=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            if (( FEAT )); then
              MINOR=$((MINOR + 1)); PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            NOTES=$(git log "${LATEST}..HEAD" --pretty=format:'- %s (%h)')
          fi

          BUILD=$(git rev-list --count HEAD)

          sed -i "s/MARKETING_VERSION = [^;]*;/MARKETING_VERSION = ${VERSION};/g" \
            orchardgrid-app.xcodeproj/project.pbxproj
          sed -i "s/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = ${BUILD};/g" \
            orchardgrid-app.xcodeproj/project.pbxproj

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet orchardgrid-app.xcodeproj/project.pbxproj; then
            git add orchardgrid-app.xcodeproj/project.pbxproj
            git commit -m "chore(release): v${VERSION} (build ${BUILD})"
          fi

          git tag "v${VERSION}"
          git push origin main --tags

          echo "${NOTES}" > /tmp/notes.md
          gh release create "v${VERSION}" --title "v${VERSION}" --notes-file /tmp/notes.md

          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "skipped=false" >> "$GITHUB_OUTPUT"

  build-macos:
    needs: release
    if: needs.release.outputs.skipped != 'true'
    runs-on: macos-26
    env:
      KEYCHAIN_PATH: /tmp/app-signing.keychain-db
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.version }}

      - name: Install certificate and API key
        env:
          MAC_CERTS_BASE64: ${{ secrets.MAC_CERTS_BASE64 }}
          MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_PRIVATE_KEY_BASE64: ${{ secrets.APPSTORE_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail

          # Decode and import the Developer ID certificate into a temporary keychain
          echo -n "$MAC_CERTS_BASE64" | base64 --decode -o "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$MAC_CERTS_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Verify the certificate is available
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          # Place the App Store Connect API key where xcodebuild expects it
          mkdir -p ~/private_keys
          echo -n "$APPSTORE_PRIVATE_KEY_BASE64" | base64 --decode \
            > ~/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

      - name: Archive
        run: |
          xcodebuild archive \
            -project orchardgrid-app.xcodeproj \
            -scheme orchardgrid-app \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "$RUNNER_TEMP/OrchardGrid.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyIssuerID "${{ secrets.APPSTORE_ISSUER_ID }}" \
            -authenticationKeyID "${{ secrets.APPSTORE_KEY_ID }}" \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Export with Developer ID signing
        run: |
          cat <<'EOF' > "$RUNNER_TEMP/ExportOptions.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>5C4299VVGU</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/OrchardGrid.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyIssuerID "${{ secrets.APPSTORE_ISSUER_ID }}" \
            -authenticationKeyID "${{ secrets.APPSTORE_KEY_ID }}" \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8

      - name: Create DMG
        run: |
          brew install create-dmg

          # Find the exported .app (name may differ from scheme name)
          APP_PATH=$(find "$RUNNER_TEMP/export" -name "*.app" -maxdepth 1 | head -1)
          APP_NAME=$(basename "$APP_PATH")

          create-dmg \
            --volname "OrchardGrid" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "$APP_NAME" 150 150 \
            --hide-extension "$APP_NAME" \
            --app-drop-link 450 150 \
            "$RUNNER_TEMP/OrchardGrid.dmg" \
            "$APP_PATH" || true
            # create-dmg returns non-zero when it can't set a custom icon; the DMG is still valid

          ls -lh "$RUNNER_TEMP/OrchardGrid.dmg"

      - name: Notarize and staple
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
        run: |
          # Codesign the DMG itself
          codesign --force --sign "Developer ID Application" "$RUNNER_TEMP/OrchardGrid.dmg"

          # Submit for notarization and capture the submission ID
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$RUNNER_TEMP/OrchardGrid.dmg" \
            --key ~/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8 \
            --key-id "$APPSTORE_KEY_ID" \
            --issuer "$APPSTORE_ISSUER_ID" \
            --wait 2>&1) || true

          echo "$SUBMIT_OUTPUT"

          # Extract submission ID
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')

          # Check if notarization was accepted
          if echo "$SUBMIT_OUTPUT" | grep -q "status: Accepted"; then
            echo "Notarization accepted!"
            xcrun stapler staple "$RUNNER_TEMP/OrchardGrid.dmg"
          else
            echo "Notarization failed. Fetching detailed log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --key ~/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8 \
              --key-id "$APPSTORE_KEY_ID" \
              --issuer "$APPSTORE_ISSUER_ID" \
              developer_log.json || true
            cat developer_log.json || true
            exit 1
          fi

      - name: Upload DMG to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release.outputs.version }}" \
            "$RUNNER_TEMP/OrchardGrid.dmg"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

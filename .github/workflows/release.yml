name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      skipped: ${{ steps.bump.outputs.skipped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and release
        id: bump
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)

          if [ -z "$LATEST" ]; then
            VERSION="1.0.0"
            echo "Initial release v${VERSION}"
            NOTES="Initial release."
          else
            COMMITS=$(git log "${LATEST}..HEAD" --pretty=format:'%s')

            FEAT=0; FIX=0
            while IFS= read -r msg; do
              [[ -z "$msg" ]] && continue
              lower=$(echo "$msg" | tr '[:upper:]' '[:lower:]')
              if [[ "$lower" =~ ^feat ]]; then FEAT=1
              elif [[ "$lower" =~ ^(fix|perf|refactor) ]]; then FIX=1
              fi
            done <<< "$COMMITS"

            if (( !FEAT && !FIX )); then
              echo "No releasable commits since ${LATEST} — skipping."
              echo "skipped=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            if (( FEAT )); then
              MINOR=$((MINOR + 1)); PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            NOTES=$(git log "${LATEST}..HEAD" --pretty=format:'- %s (%h)')
          fi

          BUILD=$(git rev-list --count HEAD)

          sed -i "s/MARKETING_VERSION = [^;]*;/MARKETING_VERSION = ${VERSION};/g" \
            orchardgrid-app.xcodeproj/project.pbxproj
          sed -i "s/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = ${BUILD};/g" \
            orchardgrid-app.xcodeproj/project.pbxproj

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet orchardgrid-app.xcodeproj/project.pbxproj; then
            git add orchardgrid-app.xcodeproj/project.pbxproj
            git commit -m "chore(release): v${VERSION} (build ${BUILD})"
          fi

          git tag "v${VERSION}"
          git push origin main --tags

          echo "${NOTES}" > /tmp/notes.md
          gh release create "v${VERSION}" --title "v${VERSION}" --notes-file /tmp/notes.md
          
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "skipped=false" >> "$GITHUB_OUTPUT"

  build-macos:
    needs: release
    if: needs.release.outputs.skipped == 'false' || needs.release.outputs.skipped == ''
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.version }}

      - name: Setup macOS Certificate and App Store Connect API Key
        env:
          MAC_CERTS_BASE64: ${{ secrets.MAC_CERTS_BASE64 }}
          MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_PRIVATE_KEY_BASE64: ${{ secrets.APPSTORE_PRIVATE_KEY_BASE64 }}
        run: |
          if [ -z "$MAC_CERTS_BASE64" ] || [ -z "$APPSTORE_PRIVATE_KEY_BASE64" ]; then
            echo "Secrets not configured, skipping build."
            exit 0
          fi

          # Install Developer ID application certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$MAC_CERTS_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$MAC_CERTS_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security find-identity -v -p codesigning

          # Setup App Store Connect API Key for xcodebuild
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$APPSTORE_PRIVATE_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

      - name: Build and Package macOS App
        env:
          MAC_CERTS_BASE64: ${{ secrets.MAC_CERTS_BASE64 }}
        run: |
          if [ -z "$MAC_CERTS_BASE64" ]; then exit 0; fi
          
          # Create ExportOptions.plist for Developer ID distribution
          cat <<EOF > ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>teamID</key>
              <string>5C4299VVGU</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF

          # Archive the app
          xcodebuild clean archive \
            -project "orchardgrid-app.xcodeproj" \
            -scheme "orchardgrid-app" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "$PWD/build/OrchardGrid.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }} \
            -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8

          # Export the archive to an .app bundle
          xcodebuild -exportArchive \
            -archivePath "$PWD/build/OrchardGrid.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$PWD/build/export" \
            -allowProvisioningUpdates \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }} \
            -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8

      - name: Create DMG and Notarize
        env:
          MAC_CERTS_BASE64: ${{ secrets.MAC_CERTS_BASE64 }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
        run: |
          if [ -z "$MAC_CERTS_BASE64" ]; then exit 0; fi
          
          # Use create-dmg to build an elegant DMG installer
          brew install create-dmg
          
          mkdir -p "$PWD/build/dmg"
          create-dmg \
            --volname "OrchardGrid" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "orchardgrid-app.app" 150 150 \
            --hide-extension "orchardgrid-app.app" \
            --app-drop-link 450 150 \
            "$PWD/build/dmg/OrchardGrid.dmg" \
            "$PWD/build/export/orchardgrid-app.app"

          # Upload DMG to Apple Notary Service
          xcrun notarytool submit "$PWD/build/dmg/OrchardGrid.dmg" \
            --key ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8 \
            --key-id "${APPSTORE_KEY_ID}" \
            --issuer "${APPSTORE_ISSUER_ID}" \
            --wait

          # Staple the ticket directly to the DMG
          xcrun stapler staple "$PWD/build/dmg/OrchardGrid.dmg"

      - name: Upload DMG to Release
        env:
          MAC_CERTS_BASE64: ${{ secrets.MAC_CERTS_BASE64 }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$MAC_CERTS_BASE64" ]; then exit 0; fi
          gh release upload "${{ needs.release.outputs.version }}" "$PWD/build/dmg/OrchardGrid.dmg"

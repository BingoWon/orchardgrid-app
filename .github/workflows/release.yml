name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      skipped: ${{ steps.bump.outputs.skipped }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Bump version and release
        id: bump
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)

          if [ -z "$LATEST" ]; then
            VERSION="1.0.0"
            echo "Initial release v${VERSION}"
            NOTES="Initial release."
          else
            COMMITS=$(git log "${LATEST}..HEAD" --pretty=format:'%s')

            FEAT=0; FIX=0
            while IFS= read -r msg; do
              [[ -z "$msg" ]] && continue
              lower=$(echo "$msg" | tr '[:upper:]' '[:lower:]')
              if [[ "$lower" =~ ^feat ]]; then FEAT=1
              elif [[ "$lower" =~ ^(fix|perf|refactor) ]]; then FIX=1
              fi
            done <<< "$COMMITS"

            if (( !FEAT && !FIX )); then
              echo "No releasable commits since ${LATEST} — skipping."
              echo "skipped=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            if (( FEAT )); then
              MINOR=$((MINOR + 1)); PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            NOTES=$(git log "${LATEST}..HEAD" --pretty=format:'- %s (%h)')
          fi

          BUILD=$(git rev-list --count HEAD)

          sed -i "s/MARKETING_VERSION = [^;]*;/MARKETING_VERSION = ${VERSION};/g" \
            orchardgrid-app.xcodeproj/project.pbxproj
          sed -i "s/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = ${BUILD};/g" \
            orchardgrid-app.xcodeproj/project.pbxproj

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet orchardgrid-app.xcodeproj/project.pbxproj; then
            git add orchardgrid-app.xcodeproj/project.pbxproj
            git commit -m "chore(release): v${VERSION} (build ${BUILD})"
          fi

          git tag "v${VERSION}"
          git push origin main --tags

          echo "${NOTES}" > /tmp/notes.md
          gh release create "v${VERSION}" --title "v${VERSION}" --notes-file /tmp/notes.md

          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "skipped=false" >> "$GITHUB_OUTPUT"

  build-macos:
    needs: release
    if: needs.release.outputs.skipped != 'true'
    runs-on: macos-26
    env:
      KEYCHAIN_PATH: /tmp/app-signing.keychain-db
      API_KEY_PATH: /tmp/AuthKey.p8
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release.outputs.version }}

      - name: Install certificate, profile, and API key
        env:
          MAC_CERTS_BASE64: ${{ secrets.MAC_CERTS_BASE64 }}
          MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_PRIVATE_KEY_BASE64: ${{ secrets.APPSTORE_PRIVATE_KEY_BASE64 }}
          MAC_PROVISION_PROFILE_BASE64: ${{ secrets.MAC_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          # Decode and import the Developer ID certificate into a temporary keychain
          echo -n "$MAC_CERTS_BASE64" | base64 --decode -o "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$MAC_CERTS_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Verify the certificate is available
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          # Install Developer ID provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "$MAC_PROVISION_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/OrchardGrid_DevID.provisionprofile

          # Place the App Store Connect API key
          echo -n "$APPSTORE_PRIVATE_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"

      - name: Archive
        run: |
          # Archive with signing disabled — we codesign manually in the next step
          # to avoid exportArchive's provisioning profile resolution entirely.
          xcodebuild archive \
            -project orchardgrid-app.xcodeproj \
            -scheme orchardgrid-app \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "$RUNNER_TEMP/OrchardGrid.xcarchive" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Sign app with Developer ID
        env:
          MAC_PROVISION_PROFILE_BASE64: ${{ secrets.MAC_PROVISION_PROFILE_BASE64 }}
        run: |
          IDENTITY="Developer ID Application"
          APP="$RUNNER_TEMP/OrchardGrid.xcarchive/Products/Applications/OrchardGrid.app"
          ENT="orchardgrid-app/orchardgrid-app-dmg.entitlements"

          # Embed the provisioning profile into the app bundle.
          # Required by macOS 26+ AMFI: restricted entitlements
          # (e.g. applesignin) must be backed by an embedded profile.
          echo -n "$MAC_PROVISION_PROFILE_BASE64" | base64 --decode \
            > "$APP/Contents/embedded.provisionprofile"

          # Sign all nested Mach-O binaries (frameworks, dylibs) from inner to outer
          find "$APP/Contents/Frameworks" -type f 2>/dev/null | while read f; do
            if file "$f" | grep -q "Mach-O"; then
              codesign --force --options runtime --timestamp \
                --sign "$IDENTITY" "$f" 2>&1 || true
            fi
          done

          # Sign each .framework bundle
          find "$APP/Contents/Frameworks" -name "*.framework" -maxdepth 1 2>/dev/null | while read fw; do
            codesign --force --options runtime --timestamp \
              --sign "$IDENTITY" "$fw" 2>&1 || true
          done

          # Sign the main app bundle with full entitlements and hardened runtime.
          # Must be done AFTER embedding the profile (profile inclusion affects the bundle hash).
          codesign --force --options runtime --timestamp \
            --sign "$IDENTITY" \
            --entitlements "$ENT" \
            "$APP" 2>&1

          echo "=== Signature Info ==="
          codesign -dvv "$APP" 2>&1 | grep -E "(Authority|Runtime|Identifier)"

      - name: Create DMG
        run: |
          brew install create-dmg

          APP="$RUNNER_TEMP/OrchardGrid.xcarchive/Products/Applications/OrchardGrid.app"
          # Standard GitHub release filename: AppName-vX.Y.Z-macos.dmg
          # Universal binary (arm64 + x86_64) — no arch suffix needed
          DMG_NAME="OrchardGrid-${{ needs.release.outputs.version }}-macos.dmg"

          create-dmg \
            --volname "OrchardGrid" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "OrchardGrid.app" 150 150 \
            --hide-extension "OrchardGrid.app" \
            --app-drop-link 450 150 \
            "$RUNNER_TEMP/$DMG_NAME" \
            "$APP" || true

          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"
          ls -lh "$RUNNER_TEMP/$DMG_NAME"

      - name: Notarize and staple
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
        run: |
          # Submit for notarization and capture the output
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$RUNNER_TEMP/$DMG_NAME" \
            --key "$API_KEY_PATH" \
            --key-id "$APPSTORE_KEY_ID" \
            --issuer "$APPSTORE_ISSUER_ID" \
            --wait 2>&1) || true

          echo "$SUBMIT_OUTPUT"

          # Extract submission ID
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')

          # Check if notarization was accepted
          if echo "$SUBMIT_OUTPUT" | grep -q "status: Accepted"; then
            echo "Notarization accepted!"
            xcrun stapler staple "$RUNNER_TEMP/$DMG_NAME"
          else
            echo "Notarization failed. Fetching detailed log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --key "$API_KEY_PATH" \
              --key-id "$APPSTORE_KEY_ID" \
              --issuer "$APPSTORE_ISSUER_ID" \
              developer_log.json || true
            cat developer_log.json || true
            exit 1
          fi

      - name: Upload DMG to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release.outputs.version }}" \
            "$RUNNER_TEMP/$DMG_NAME"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

  update-tap:
    needs: [release, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Bump cask in homebrew-orchardgrid
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          V=${VERSION#v}
          DMG="OrchardGrid-v${V}-macos.dmg"

          gh release download "v${V}" -R BingoWon/orchardgrid-app -p "$DMG"
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')

          gh repo clone BingoWon/homebrew-orchardgrid tap
          cd tap
          sed -i "s/version \".*\"/version \"${V}\"/" Casks/orchardgrid.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/orchardgrid.rb

          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -am "Update orchardgrid to v${V}"
          git push
